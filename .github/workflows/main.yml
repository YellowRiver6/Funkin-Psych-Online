name: Build Psych Extended Online (Windows Only)
on: workflow_dispatch

permissions:
  contents: read

env:
  PROJECT_NAME: PsychExtendedOnline

jobs:
  build:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          
      # 这里是你原有的构建逻辑（调用内部工作流）
      - name: Build Windows
        uses: ./.github/workflows/build.yml
        with:
          name: Windows
          os: windows-latest
          buildArgs: "windows -final -D officialBuild"
          artifactName: WindowsBuild
          # 请确认你的 Windows 构建产物路径，这是通用格式
          artifactPath: "export/release/windows/*.zip"
